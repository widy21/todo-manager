<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Todo Manager{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="topbar">
        <a class="brand" href="{{ url_for('index') }}">Todo Manager</a>
        <div class="nav-links">
            <a href="{{ url_for('index') }}">首页</a>
            <a href="{{ url_for('todo_new') }}">新建待办</a>
            <a href="{{ url_for('categories') }}">分类管理</a>
            <a href="{{ url_for('reports') }}">报告</a>
            <a href="{{ url_for('archive') }}">归档</a>
        </div>
    </nav>

    <main class="page-shell">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-stack">
                    {% for category, message in messages %}
                        <div class="flash flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
