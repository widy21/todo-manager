{% extends 'base.html' %}
{% block title %}修改密码 - Todo Manager{% endblock %}
{% block content %}
<section class="page-header">
    <div>
        <p class="eyebrow">Security</p>
        <h1>修改密码</h1>
    </div>
</section>

<form class="form-card password-card" method="post" action="{{ url_for('password_change') }}">
    <label>
        <span>当前密码</span>
        <input type="password" name="current_password" required autocomplete="current-password" placeholder="请输入当前密码">
    </label>
    <label>
        <span>新密码</span>
        <input type="password" name="new_password" required autocomplete="new-password" placeholder="至少 6 位">
    </label>
    <label>
        <span>确认新密码</span>
        <input type="password" name="confirm_password" required autocomplete="new-password" placeholder="再次输入新密码">
    </label>
    <div class="form-actions">
        <a class="btn btn-secondary" href="{{ url_for('index') }}">返回</a>
        <button class="btn btn-primary" type="submit">更新密码</button>
    </div>
</form>
{% endblock %}
