{% extends 'base.html' %}
{% block title %}登录 - Todo Manager{% endblock %}
{% block content %}
<section class="auth-shell">
    <div class="auth-copy">
        <p class="eyebrow">Sign in</p>
        <h1>登录后查看你的待办空间</h1>
        <p class="auth-text">系统支持多用户隔离。待办、分类、归档和报告只展示当前账号自己的数据。</p>
    </div>

    <form class="form-card auth-card" method="post" action="{{ url_for('login') }}">
        <input type="hidden" name="next" value="{{ next_url }}">
        <label>
            <span>用户名</span>
            <input name="username" required autocomplete="username" placeholder="请输入用户名">
        </label>
        <label>
            <span>密码</span>
            <input type="password" name="password" required autocomplete="current-password" placeholder="请输入密码">
        </label>
        <button class="btn btn-primary auth-submit" type="submit">登录</button>
    </form>
</section>
{% endblock %}
